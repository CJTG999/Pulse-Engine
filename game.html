<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pulse Engine</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

canvas {
    position: absolute;
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<audio id="inst"></audio>
<audio id="vp"></audio>
<audio id="vo"></audio>

<script>
// =============================
// CDN SYNC SYSTEM (NEW)
// =============================
const params = new URLSearchParams(location.search);

let useCDN =
    params.get("cdn") === "1" ||
    localStorage.getItem("pulse_cdn") === "1";

const BASE = useCDN
    ? "https://cdn.jsdelivr.net/gh/CJTG999/Pulse-Engine@main/"
    : "";

function path(p){
    return BASE + p;
}

// =============================
// CANVAS
// =============================
const c = document.getElementById("c");
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

// =============================
// WEEK SYSTEM
// =============================
const week = params.get("week") || "1";

// =============================
// SONG RESOLVE
// =============================
let song = "bopeebo";

if (week === "1") song = "bopeebo";

// =============================
// AUDIO
// =============================
const inst = document.getElementById("inst");
const vp = document.getElementById("vp");
const vo = document.getElementById("vo");

inst.src = path(`audio/songs/${song}.ogg`);
vp.src   = path(`audio/songs/Voices-Player.ogg`);
vo.src   = path(`audio/songs/Voices-Opponent.ogg`);

// =============================
// INPUT
// =============================
const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// =============================
// IMAGE
// =============================
function img(src){
    const i = new Image();
    i.src = path(src);
    return i;
}

const arrows = img("images/game/notes/arrows.png");

// =============================
// CHART
// =============================
let notes = [];

fetch(path(`data/charts/${song}.json`))
.then(r => r.json())
.then(d => {
    notes = d.notes.map(n => ({...n, hit:false}));
});

// =============================
// START
// =============================
let started = false;
let time = 0;

setTimeout(() => {
    inst.play();
    vp.play();
    vo.play();
    started = true;
}, 500);

// =============================
// LOOP
// =============================
function update(){
    if(!started) return;

    time = inst.currentTime;

    const map = ["a","s","w","d"];

    for(let i=0;i<4;i++){
        if(!keys[map[i]]) continue;

        for(let n of notes){
            if(n.hit || n.lane !== i) continue;

            let diff = time - n.time;

            if(diff > -0.2 && diff < 0.2){
                n.hit = true;
                break;
            }
        }
    }

    for(let n of notes){
        if(!n.hit && time - n.time > 0.25){
            n.hit = true;
        }
    }
}

function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    for(let n of notes){
        if(n.hit) continue;

        let x = c.width/2 + (n.lane-2)*90;
        let y = 200 + (n.time-time)*500;

        ctx.drawImage(arrows, x, y, 50, 50);
    }

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("SONG: " + song, 50, 50);
    ctx.fillText("CDN: " + (useCDN ? "ON" : "OFF"), 50, 80);
}

// =============================
// LOOP
// =============================
let last = performance.now();
function loop(now){
    let dt = (now-last)/1000;
    last=now;

    update(dt);
    draw();

    requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
