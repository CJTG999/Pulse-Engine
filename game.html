<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PulseEngine - FULL Psych Audio Sync</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

/* CAMERA */
#camera {
  position: absolute;
  width: 100%;
  height: 100%;
  transform-origin: center;
}

/* STAGE */
#stage {
  position: absolute;
  width: 120%;
  height: 120%;
  left: -10%;
  top: -10%;
}

/* NOTES */
.note {
  position: absolute;
  width: 64px;
  height: 64px;
  background: white;
}

/* STRUM */
.strum {
  position: absolute;
  top: 420px;
  width: 64px;
  height: 64px;
  background: gray;
}

/* SPLASH */
.splash {
  position: absolute;
  width: 100px;
  height: 100px;
  background: yellow;
  opacity: 0.8;
  animation: pop 0.25s forwards;
}

@keyframes pop {
  to { transform: scale(1.5); opacity: 0; }
}

/* UI */
#ui {
  position: absolute;
  left: 10px;
  top: 10px;
  color: white;
}

/* EDITOR */
#editor {
  position: absolute;
  bottom: 10px;
  right: 10px;
  color: white;
  display: none;
  background: #000a;
  padding: 10px;
}
</style>
</head>

<body>

<div id="camera">
  <div id="stage"></div>
</div>

<div id="ui">
Score: <span id="score">0</span><br>
Combo: <span id="combo">0</span><br>
Mode: <span id="mode">PLAY</span>
</div>

<div id="editor">
EDITOR MODE<br>
Click = place note<br>
Press Q = export JSON
</div>

<audio id="inst" src="audio/songs/Inst.ogg"></audio>

<script>
// =====================================================
// 🎵 AUDIO SYNC CORE (REAL PSYCH STYLE)
// =====================================================
const audio = document.getElementById("inst");

let songStartTime = 0;
let audioOffset = 0;

// =====================================================
// 🎮 STATE
// =====================================================
let notes = [];
let combo = 0;
let score = 0;

let editorMode = false;

// =====================================================
// 🎯 CAMERA
// =====================================================
let camX = 0, camY = 0;
let targetX = 0;

// =====================================================
// 🎵 CHART (PSYCH STYLE)
// =====================================================
let chart = {
  song: {
    bpm: 100,
    notes: []
  }
};

// =====================================================
// 🎯 AUDIO TIME (CRITICAL FIX)
// =====================================================
function getSongTime() {
  return (audio.currentTime * 1000) + audioOffset;
}

// =====================================================
// 🎯 SPAWN NOTE
// =====================================================
function spawnNote(time, lane) {
  notes.push({
    time,
    lane,
    hit:false,
    el:null
  });
}

// =====================================================
// 🎯 LOAD DEMO CHART
// =====================================================
function loadChart() {
  for (let i = 0; i < 120; i++) {
    spawnNote(i * 600, i % 4);
  }
}

// =====================================================
// 🎮 HIT DETECTION (AUDIO SYNCED)
// =====================================================
function hit(lane) {
  const now = getSongTime();

  let best = null;
  let bestDiff = 9999;

  for (let n of notes) {
    if (n.hit || n.lane !== lane) continue;

    const diff = Math.abs(now - n.time);
    if (diff < 120 && diff < bestDiff) {
      best = n;
      bestDiff = diff;
    }
  }

  if (!best) {
    combo = 0;
    return;
  }

  best.hit = true;
  combo++;
  score += 200;

  splash(lane);
  updateUI();
}

// =====================================================
// 🎯 SPLASH
// =====================================================
function splash(lane) {
  const s = document.createElement("div");
  s.className = "splash";
  s.style.left = (300 + lane * 80) + "px";
  s.style.top = "420px";
  document.body.appendChild(s);

  setTimeout(() => s.remove(), 250);
}

// =====================================================
// 🎮 INPUT
// =====================================================
document.addEventListener("keydown", e => {

  const map = { d:0, f:1, j:2, k:3 };

  if (map[e.key] !== undefined) {
    hit(map[e.key]);
  }

  // EDITOR TOGGLE
  if (e.key === "e") {
    editorMode = !editorMode;
    document.getElementById("editor").style.display =
      editorMode ? "block" : "none";

    document.getElementById("mode").innerText =
      editorMode ? "EDITOR" : "PLAY";
  }

  // EXPORT
  if (e.key === "q" && editorMode) {
    console.log(JSON.stringify(chart, null, 2));
    alert("Chart exported to console");
  }
});

// =====================================================
// 🧠 EDITOR CLICK PLACEMENT
// =====================================================
document.addEventListener("click", e => {
  if (!editorMode) return;

  const lane = Math.floor((e.clientX - 300) / 80);

  const time = getSongTime() + 2000;

  spawnNote(time, lane);
  chart.song.notes.push([time, lane, 0]);
});

// =====================================================
// 📊 UI
// =====================================================
function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("combo").innerText = combo;
}

// =====================================================
// 🎵 AUDIO SYNC START
// =====================================================
function startSong() {
  audio.play();
  songStartTime = performance.now();
}

// =====================================================
// ⏱ GAME LOOP (AUDIO LOCKED)
// =====================================================
function loop() {

  const now = getSongTime();

  // update notes
  for (let n of notes) {
    if (n.hit) continue;

    if (now > n.time + 150) {
      n.hit = true;
      combo = 0;
    }
  }

  updateUI();

  requestAnimationFrame(loop);
}

// =====================================================
// 🚀 START
// =====================================================
function start() {
  loadChart();
  startSong();
  loop();
}

start();
</script>

</body>
</html>
