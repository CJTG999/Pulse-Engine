<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>pulseengine</title>

<style>
@font-face {
  font-family: "main";
  src: url("data/fonts/main.ttf");
}

body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: "main";
  color: white;
}

/* STAGE */
#stage {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #111;
}

/* LOGO BUMP */
#logo {
  position: absolute;
  left: 50%;
  top: 70px;
  transform: translateX(-50%);
  font-size: 42px;
  animation: bump 1s infinite;
}

@keyframes bump {
  0% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.1); }
  100% { transform: translateX(-50%) scale(1); }
}

/* STRUMS */
.strum {
  position: absolute;
  width: 64px;
  height: 64px;
  background: gray;
  bottom: 80px;
}

/* NOTES */
.note {
  position: absolute;
  width: 64px;
  height: 64px;
  background: white;
}

/* UI */
#ui {
  position: absolute;
  left: 10px;
  top: 10px;
  font-size: 14px;
  text-transform: lowercase;
}

/* HEALTH */
#healthBar {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  height: 10px;
  background: #222;
}

#healthFill {
  width: 50%;
  height: 100%;
  background: lime;
}
</style>
</head>

<body>

<div id="stage"></div>
<div id="logo">pulse engine</div>

<div id="ui">
score: <span id="score">0</span><br>
combo: <span id="combo">0</span><br>
state: play
</div>

<div id="healthBar"><div id="healthFill"></div></div>

<audio id="inst" src="audio/songs/Inst.ogg"></audio>

<script>
// =========================
// 🎵 AUDIO
// =========================
const audio = document.getElementById("inst");

// =========================
// 🎮 STATE
// =========================
let notes = [];
let combo = 0;
let score = 0;
let startTime = 0;

// =========================
// 🎯 CONFIG
// =========================
const SPEED = 0.6;
const STRUM_Y = window.innerHeight - 80;

// =========================
// 🚀 START SAFE
// =========================
window.onload = () => {
  init();
};

function init() {
  createStrums();
  loadChart();

  audio.play().catch(()=>{});

  startTime = performance.now();

  loop();
}

// =========================
// 🎯 STRUMS (VISIBLE FIX)
// =========================
function createStrums() {
  for (let i = 0; i < 4; i++) {
    const s = document.createElement("div");
    s.className = "strum";
    s.style.left = (300 + i * 80) + "px";
    s.style.bottom = "80px";
    document.body.appendChild(s);
  }
}

// =========================
// 🎵 FULL CHART (NO CUT FUNCTION)
// =========================
function loadChart() {
  const step = 600;

  for (let i = 0; i < 80; i++) {
    notes.push({
      time: i * step,
      lane: i % 4,
      hit: false,
      el: createNote(i % 4)
    });
  }
}

// =========================
// 🎯 NOTE CREATION (FIXED VISIBILITY)
// =========================
function createNote(lane) {
  const n = document.createElement("div");
  n.className = "note";
  n.style.left = (300 + lane * 80) + "px";
  n.style.top = "-100px";
  document.body.appendChild(n);
  return n;
}

// =========================
// 🎯 HIT SYSTEM (SAFE)
// =========================
function hit(lane) {
  for (let n of notes) {
    if (n.hit) continue;
    if (n.lane !== lane) continue;

    const time = getTime();
    const diff = Math.abs(n.time - time);

    if (diff < 150) {
      n.hit = true;
      combo++;
      score += 200;
      n.el.style.opacity = 0;
      updateUI();
      return;
    }
  }

  combo = 0;
  updateUI();
}

// =========================
// ⏱ TIME SYSTEM
// =========================
function getTime() {
  return performance.now() - startTime;
}

// =========================
// 🎮 INPUT
// =========================
document.addEventListener("keydown", e => {
  const map = { d:0, f:1, j:2, k:3 };
  if (map[e.key] !== undefined) hit(map[e.key]);
});

// =========================
// 📊 UI
// =========================
function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("combo").innerText = combo;
}

// =========================
// 🎮 LOOP (DOWNSCROLL FIXED)
// =========================
function loop() {
  const time = getTime();

  for (let n of notes) {
    if (n.hit) continue;

    const y = (time - n.time) * SPEED + STRUM_Y - 400;

    n.el.style.top = y + "px";

    if (y > window.innerHeight + 100) {
      n.hit = true;
      combo = 0;
      updateUI();
    }
  }

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
