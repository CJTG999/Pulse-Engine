<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pulse Engine - Game</title>

<style>
@font-face {
    font-family: main;
    src: url("data/fonts/main.ttf");
}

body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: main;
}

/* STAGE */
#stage {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("images/game/stages/stage/stageback.png") center/cover;
}

/* SIMPLE HUD */
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 20px;
}

/* NOTE AREA */
#notes {
    position: absolute;
    bottom: 120px;
    width: 100%;
    text-align: center;
}

.note {
    display: inline-block;
    width: 60px;
    height: 60px;
    margin: 10px;
    background: white;
    opacity: 0.8;
}
</style>
</head>

<body>

<div id="stage"></div>

<div id="hud">
    Pulse Engine Prototype<br>
    Time: <span id="time">0</span>
</div>

<div id="notes">
    <div class="note"></div>
    <div class="note"></div>
    <div class="note"></div>
    <div class="note"></div>
</div>

<audio id="inst" src="audio/songs/Inst.ogg"></audio>

<script>
// ===== BASIC STATE =====
let time = 0;
let started = false;

// ===== LOAD MUSIC =====
const inst = document.getElementById("inst");

// ===== START SONG =====
function startSong() {
    inst.play();
    started = true;
}

// auto start after load
window.onload = () => {
    setTimeout(startSong, 500);
};

// ===== GAME LOOP =====
function loop() {
    if (started) {
        time += 1/60;
        document.getElementById("time").innerText = time.toFixed(2);
    }
    requestAnimationFrame(loop);
}
loop();

// ===== INPUTS (DFJK + ARROWS) =====
document.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();

    if (["d","f","j","k","arrowleft","arrowdown","arrowup","arrowright"].includes(key)) {
        console.log("Hit:", key);
    }
});
</script>

</body>
</html>
