<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Engine - Prototype</title>
    <style>
        @font-face {
            font-family: 'Phantommuff';
            src: url('fonts/main.ttf') format('truetype'),
                 url('https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/fnf0.7.5/assets/fonts/vcr.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1280" height="720"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const STATES = { LOADING: -1, INTRO: 0, TITLE_SCREEN: 1 };
let currentState = STATES.LOADING;

// --- LOCAL PATHS (Updated Path Configuration) ---
const ASSET_PATHS = {
    ngLogo: "/images/menus/newgrounds_logo.png",
    logoPng: "/images/menus/logoBumpin.png",
    logoXml: "/images/menus/logoBumpin.xml"
};

const assets = {
    ngImage: new Image(),
    logoImage: new Image(),
    logoFrames: []
};

// --- ANIMATION TRACKING ---
let currentFrameIndex = 0;
let isAnimatingLogo = false;
let animationTimer = 0;
const FRAME_RATE = 1000 / 24; 

// --- 25% CHANCE EASTER EGG ---
const isEasterEgg = Math.random() < 0.25;
const finalTitleDrop = isEasterEgg ? ["USE", "DFJK", "LOL"] : ["FNF", "PULSE", "ENGINE"];

// --- PRECISE TIMELINE ---
const introTimeline = [
    { time: 500,  text: ["Created By"], showNG: false },
    { time: 2250, text: ["Created By", "CJTG999"], showNG: false },
    { time: 3750, text: [], showNG: false },
    { time: 4250, text: ["Not Associated With"], showNG: false },
    { time: 6000, text: ["Not Associated With", "Newgrounds"], showNG: true },
    { time: 7500, text: [], showNG: false },
    { time: 8000, text: ["Pure HTML"], showNG: false },
    { time: 9750, text: ["Pure HTML", "No Haxe in sight"], showNG: false },
    { time: 11250, text: [], showNG: false },
    { time: 11750, text: [finalTitleDrop[0]], showNG: false },
    { time: 12250, text: [finalTitleDrop[0], finalTitleDrop[1]], showNG: false },
    { time: 12750, text: [finalTitleDrop[0], finalTitleDrop[1], finalTitleDrop[2]], showNG: false },
    { time: 14500, transition: true }
];

let currentText = ["LOADING ENGINE ASSETS..."];
let drawNewgroundsLogo = false;
let startTime = null;

// --- TITLE SCREEN VISUALS ---
let dareBgOffset = 0;
const DARE_BG_SPEED = 2;
let lastBeatCheck = 0;

// --- LOCAL ASSET PRELOADER ---
async function preloadAssets() {
    try {
        const loadImg = (img, src) => new Promise((resolve) => {
            img.src = src;
            img.onload = () => resolve();
            img.onerror = () => { 
                console.warn("Skipping image (using text fallback):", src); 
                resolve(); 
            };
        });

        // Load images locally from assets/images/menus/
        await Promise.all([
            loadImg(assets.ngImage, ASSET_PATHS.ngLogo),
            loadImg(assets.logoImage, ASSET_PATHS.logoPng)
        ]);

        // Fetch and Parse local XML file
        try {
            const response = await fetch(ASSET_PATHS.logoXml);
            if (response.ok) {
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const subTextures = xmlDoc.getElementsByTagName("SubTexture");

                for (let i = 0; i < subTextures.length; i++) {
                    let frame = subTextures[i];
                    assets.logoFrames.push({
                        name: frame.getAttribute("name"),
                        x: parseInt(frame.getAttribute("x")),
                        y: parseInt(frame.getAttribute("y")),
                        width: parseInt(frame.getAttribute("width")),
                        height: parseInt(frame.getAttribute("height")),
                        frameX: parseInt(frame.getAttribute("frameX") || 0),
                        frameY: parseInt(frame.getAttribute("frameY") || 0)
                    });
                }
            }
        } catch (xmlError) {
            console.warn("XML parsing failed, using text logo fallback:", xmlError);
        }
        
        currentState = STATES.INTRO;
        currentText = [];
    } catch (e) {
        console.error("Forcing engine start:", e);
        currentState = STATES.INTRO;
        currentText = [];
    }
}

// --- ENGINE LOOPS ---
function update(currentTime) {
    if (currentState === STATES.LOADING) return;

    if (!startTime) startTime = currentTime;
    const elapsed = currentTime - startTime;

    if (currentState === STATES.INTRO) {
        let activeEvent = null;
        for (let i = 0; i < introTimeline.length; i++) {
            if (elapsed >= introTimeline[i].time) {
                activeEvent = introTimeline[i];
            }
        }

        if (activeEvent) {
            if (activeEvent.transition) {
                currentState = STATES.TITLE_SCREEN;
            } else {
                currentText = activeEvent.text;
                drawNewgroundsLogo = activeEvent.showNG;
            }
        }
    } 
    else if (currentState === STATES.TITLE_SCREEN) {
        dareBgOffset -= DARE_BG_SPEED;
        if (dareBgOffset <= -1280) dareBgOffset = 0;

        let currentBeatCheck = Math.floor(elapsed / 500);
        if (currentBeatCheck > lastBeatCheck) {
            isAnimatingLogo = true;
            currentFrameIndex = 0; 
            lastBeatCheck = currentBeatCheck;
        }

        if (isAnimatingLogo && assets.logoFrames.length > 0) {
            animationTimer += 16.67; 
            if (animationTimer >= FRAME_RATE) {
                animationTimer = 0;
                currentFrameIndex++;
                if (currentFrameIndex >= assets.logoFrames.length) {
                    currentFrameIndex = assets.logoFrames.length - 1; 
                    isAnimatingLogo = false; 
                }
            }
        }
    }
}

function draw() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '55px "Phantommuff", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (currentState === STATES.LOADING) {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillText(currentText[0], canvas.width / 2, canvas.height / 2);
    }
    else if (currentState === STATES.INTRO) {
        ctx.fillStyle = '#FFFFFF';
        let startY = canvas.height / 2 - (currentText.length * 35);
        
        currentText.forEach((line, index) => {
            ctx.fillText(line, canvas.width / 2, startY + (index * 75));
        });

        if (drawNewgroundsLogo && assets.ngImage.complete && assets.ngImage.width > 0) {
            let size = 150;
            ctx.drawImage(assets.ngImage, canvas.width / 2 - (size / 2), startY + (currentText.length * 75) + 20, size, size);
        }
    } 
    else if (currentState === STATES.TITLE_SCREEN) {
        // Sliding Dare Screen Grid Placeholder
        ctx.fillStyle = '#330033';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#470047';
        for (let i = 0; i < canvas.width + 100; i += 100) {
            ctx.fillRect(i + (dareBgOffset % 100), 0, 15, canvas.height);
        }

        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Render Animated XML Logo or Text Fallback
        if (assets.logoImage.complete && assets.logoFrames.length > 0) {
            const frame = assets.logoFrames[currentFrameIndex];
            ctx.save();
            ctx.translate(canvas.width / 2 - (frame.width / 2) - frame.frameX, canvas.height / 2 - (frame.height / 2) - frame.frameY - 60);
            ctx.drawImage(
                assets.logoImage,
                frame.x, frame.y, frame.width, frame.height,
                0, 0, frame.width, frame.height
            );
            ctx.restore();
        } else {
            ctx.fillStyle = '#FFF100';
            ctx.font = '90px "Phantommuff", sans-serif';
            ctx.fillText("PULSE ENGINE", canvas.width / 2, canvas.height / 2 - 60);
        }

        ctx.font = '42px "Phantommuff", sans-serif';
        ctx.fillStyle = '#FFFFFF';
        ctx.fillText("CLICK or PRESS ENTER to start", canvas.width / 2, canvas.height - 110);
    }
}

function gameLoop(currentTime) {
    update(currentTime);
    draw();
    requestAnimationFrame(gameLoop);
}

function advanceScreen() {
    if (currentState === STATES.INTRO) {
        currentState = STATES.TITLE_SCREEN;
    } else if (currentState === STATES.TITLE_SCREEN) {
        console.log("Routing to gameloop/mainmenu.js next!");
    }
}

window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') advanceScreen();
});

canvas.addEventListener('click', () => {
    if (currentState === STATES.LOADING) return;
    advanceScreen();
});

preloadAssets();
requestAnimationFrame(gameLoop);
</script>

</body>
</html>
