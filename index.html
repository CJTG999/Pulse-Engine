<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pulse Engine</title>

<style>
@font-face {
    font-family: main;
    src: url("data/fonts/main.ttf");
}

body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: main;
}

#bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("images/menus/menubg.png") center/cover no-repeat;
    filter: brightness(0.7);
}

#logo {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    image-rendering: pixelated;
    animation: bump 1.2s infinite;
}

@keyframes bump {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.05); }
    100% { transform: translateX(-50%) scale(1); }
}

#play {
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
    color: white;
    cursor: pointer;
    user-select: none;
}

#play:hover {
    transform: translateX(-50%) scale(1.1);
}
</style>
</head>

<body>

<div id="bg"></div>

<img id="logo" src="images/menus/logoBumpin.png">

<div id="play" onclick="startGame()">PLAY</div>

<script>
function startGame() {
    window.location.href = "game.html";
}
</script>

</body>
</html>
