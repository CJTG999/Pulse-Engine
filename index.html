<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Engine - Prototype</title>
    <style>
        @font-face {
            font-family: 'Phantommuff';
            src: url('https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/fnf0.7.5/assets/fonts/vcr.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1280" height="720"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const STATES = { INTRO: 0, TITLE_SCREEN: 1 };
let currentState = STATES.INTRO;

// --- 25% CHANCE EASTER EGG ---
const isEasterEgg = Math.random() < 0.25;
const finalTitleDrop = isEasterEgg ? ["USE", "DFJK", "LOL"] : ["FNF", "PULSE", "ENGINE"];

// --- PRECISE MILLISECOND TIMELINE ---
// Delays: 1.75s between lines, 0.5s between sections, 0.5s between final drops
const introTimeline = [
    // Section 1
    { time: 500,  text: ["Created By"], showNG: false },
    { time: 2250, text: ["Created By", "CJTG999"], showNG: false }, // +1.75s
    { time: 3750, text: [], showNG: false },                        // +1.5s clear screen

    // Section 2
    { time: 4250, text: ["Not Associated With"], showNG: false },   // +0.5s section delay
    { time: 6000, text: ["Not Associated With", "Newgrounds"], showNG: true }, // +1.75s
    { time: 7500, text: [], showNG: false },                        // +1.5s clear screen

    // Section 3
    { time: 8000, text: ["Pure HTML"], showNG: false },             // +0.5s section delay
    { time: 9750, text: ["Pure HTML", "No Haxe in sight"], showNG: false }, // +1.75s
    { time: 11250, text: [], showNG: false },                       // +1.5s clear screen

    // Section 4: Title Drop (0.5s delays)
    { time: 11750, text: [finalTitleDrop[0]], showNG: false },      // +0.5s section delay
    { time: 12250, text: [finalTitleDrop[0], finalTitleDrop[1]], showNG: false }, // +0.5s
    { time: 12750, text: [finalTitleDrop[0], finalTitleDrop[1], finalTitleDrop[2]], showNG: false }, // +0.5s
    { time: 14500, transition: true }                               // Move to main screen
];

let currentText = [];
let drawNewgroundsLogo = false;
let startTime = null;

// --- TITLE SCREEN VISUALS ---
let logoScale = 1.0;
let dareBgOffset = 0;
const DARE_BG_SPEED = 2;
let lastBeatCheck = 0;

// --- ASSET LOADING ---
const assets = {
    ngImage: new Image(),
    logoImage: new Image(),
    bgImage: new Image()
};

// Standard web-fallback assets
assets.ngImage.crossOrigin = "anonymous";
assets.ngImage.src = 'https://pins.newgrounds.com/images/pins/classic-tank.png'; // Direct link to classic tank icon

assets.logoImage.crossOrigin = "anonymous";
assets.logoImage.src = 'https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/fnf0.7.5/assets/images/logoBumpin.png';

assets.bgImage.crossOrigin = "anonymous";
assets.bgImage.src = 'https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/fnf0.7.5/assets/images/stageback.png';

// --- ENGINE LOOPS ---
function update(currentTime) {
    if (!startTime) startTime = currentTime;
    const elapsed = currentTime - startTime;

    if (currentState === STATES.INTRO) {
        // Find the most recent timeline event that matches our current time
        let activeEvent = null;
        for (let i = 0; i < introTimeline.length; i++) {
            if (elapsed >= introTimeline[i].time) {
                activeEvent = introTimeline[i];
            }
        }

        if (activeEvent) {
            if (activeEvent.transition) {
                currentState = STATES.TITLE_SCREEN;
            } else {
                currentText = activeEvent.text;
                drawNewgroundsLogo = activeEvent.showNG;
            }
        }
    } 
    else if (currentState === STATES.TITLE_SCREEN) {
        dareBgOffset -= DARE_BG_SPEED;
        if (dareBgOffset <= -1280) dareBgOffset = 0;

        // Fake a steady 120 BPM bump rhythm (every 500ms)
        let currentBeatCheck = Math.floor(elapsed / 500);
        if (currentBeatCheck > lastBeatCheck) {
            logoScale = 1.18; // Bump!
            lastBeatCheck = currentBeatCheck;
        }

        logoScale += (1.0 - logoScale) * 0.15;
    }
}

function draw() {
    // Clear Canvas
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Font Defaults
    ctx.font = '55px "Phantommuff", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (currentState === STATES.INTRO) {
        ctx.fillStyle = '#FFFFFF';
        let startY = canvas.height / 2 - (currentText.length * 35);
        
        currentText.forEach((line, index) => {
            ctx.fillText(line, canvas.width / 2, startY + (index * 75));
        });

        // Safe Image Draw (Won't crash engine if image fails to download)
        if (drawNewgroundsLogo && assets.ngImage.complete && assets.ngImage.width > 0) {
            try {
                let size = 120; // square tank icon size
                ctx.drawImage(assets.ngImage, canvas.width / 2 - (size / 2), startY + (currentText.length * 75) + 20, size, size);
            } catch (e) {
                console.warn("Failed to render NG image placeholder safely:", e);
            }
        }

    } else if (currentState === STATES.TITLE_SCREEN) {
        // 1. Background Layer
        if (assets.bgImage.complete && assets.bgImage.width > 0) {
            ctx.drawImage(assets.bgImage, dareBgOffset, 0, 1280, 720);
            ctx.drawImage(assets.bgImage, dareBgOffset + canvas.width, 0, 1280, 720);
        } else {
            ctx.fillStyle = '#330033';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Dark dim overlay
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Logo Layer
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2 - 60);
        ctx.scale(logoScale, logoScale);
        
        if (assets.logoImage.complete && assets.logoImage.width > 0) {
            ctx.drawImage(assets.logoImage, -350, -200, 700, 400);
        } else {
            ctx.fillStyle = '#FFF100';
            ctx.font = '90px "Phantommuff", sans-serif';
            ctx.fillText("PULSE ENGINE", 0, 0);
        }
        ctx.restore();

        // 3. UI Prompt Text
        ctx.font = '42px "Phantommuff", sans-serif';
        ctx.fillStyle = '#FFFFFF';
        ctx.fillText("CLICK or PRESS ENTER to start", canvas.width / 2, canvas.height - 110);
    }
}

function gameLoop(currentTime) {
    update(currentTime);
    draw();
    requestAnimationFrame(gameLoop);
}

function advanceScreen() {
    if (currentState === STATES.INTRO) {
        currentState = STATES.TITLE_SCREEN;
    } else if (currentState === STATES.TITLE_SCREEN) {
        console.log("Ready to initialize mainmenu.js script routing!");
    }
}

window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') advanceScreen();
});

canvas.addEventListener('click', () => {
    advanceScreen();
});

requestAnimationFrame(gameLoop);
</script>

</body>
</html>
