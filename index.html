<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Engine - Prototype</title>
    <style>
        @font-face {
            font-family: 'Phantommuff';
            src: url('https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/fnf0.7.5/assets/fonts/vcr.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1280" height="720"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME STATES ---
const STATES = { INTRO: 0, TITLE_SCREEN: 1 };
let currentState = STATES.INTRO;

// --- AUDIO/BPM TIMING (Fixed at 120 BPM for 0.5s beats) ---
const BPM = 120; 
const beatInterval = (60 / BPM) * 1000; // Exactly 500ms per beat
let startTime = null;

// --- DETERMINING EASTER EGG (25% CHANCE) ---
const isEasterEgg = Math.random() < 0.25;
const finalTitleDrop = isEasterEgg ? ["USE", "DFJK", "LOL"] : ["FNF", "PULSE", "ENGINE"];

// --- CUSTOM TIME TIMELINE ---
// Based on: 1.75s line delay (3.5 beats), 0.5s section delay (1 beat), 0.5s drop delay (1 beat)
const introSequences = [
    // --- SECTION 1 ---
    { beat: 1.0, text: ["Created By"], image: null },
    { beat: 4.5, text: ["Created By", "CJTG999"], image: null }, // +1.75s (3.5 beats)
    
    // Clear screen: 1 beat pause (0.5s) after Section 1 finishes at beat 5.5
    { beat: 6.5, text: [], image: null }, 

    // --- SECTION 2 ---
    { beat: 7.5, text: ["Not Associated With"], image: null },
    { beat: 11.0, text: ["Not Associated With", "Newgrounds"], image: 'newgrounds' }, // +1.75s (3.5 beats)
    
    // Clear screen: 1 beat pause (0.5s) after Section 2 finishes at beat 12.0
    { beat: 13.0, text: [], image: null },

    // --- SECTION 3 ---
    { beat: 14.0, text: ["Pure HTML"], image: null },
    { beat: 17.5, text: ["Pure HTML", "No Haxe in sight"], image: null }, // +1.75s (3.5 beats)
    
    // Clear screen: 1 beat pause (0.5s) after Section 3 finishes at beat 18.5
    { beat: 19.5, text: [], image: null },

    // --- SECTION 4: TITLE DROP --- (0.5s / 1 beat pacing)
    { beat: 20.5, text: [finalTitleDrop[0]], image: null },
    { beat: 21.5, text: [finalTitleDrop[0], finalTitleDrop[1]], image: null },
    { beat: 22.5, text: [finalTitleDrop[0], finalTitleDrop[1], finalTitleDrop[2]], image: null }
];

// Screen auto-transitions to Title Screen 1.5 seconds after final text drops
const TRANSITION_BEAT = 25.5; 

let currentIntroText = [];
let currentIntroImage = null;
let lastExecutedBeat = 0;

// --- VISUAL VARIABLES ---
let logoScale = 1.0;
let dareBgOffset = 0;
const DARE_BG_SPEED = 2; 

// --- ASSET LOADING ---
const assets = {
    fontLoaded: false,
    ngImage: new Image(),
    logoImage: new Image(),
    bgImage: new Image() 
};

assets.ngImage.crossOrigin = "anonymous";
assets.ngImage.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Newgrounds_text_logo.svg/512px-Newgrounds_text_logo.svg.png';

assets.logoImage.crossOrigin = "anonymous";
assets.logoImage.src = 'https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/fnf0.7.5/assets/images/logoBumpin.png';

assets.bgImage.crossOrigin = "anonymous";
assets.bgImage.src = 'https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/fnf0.7.5/assets/images/stageback.png'; 

document.fonts.load('10px "Phantommuff"').then(() => {
    assets.fontLoaded = true;
});

// --- ENGINE LOOPS ---
function update(currentTime) {
    if (!startTime) startTime = currentTime;
    const elapsedTime = currentTime - startTime;
    
    // Calculate current fractional beat location precisely matching time
    const currentBeat = elapsedTime / beatInterval;

    if (currentState === STATES.INTRO) {
        // Run checks dynamically across the decimal timeline entries
        introSequences.forEach(seq => {
            if (currentBeat >= seq.beat && lastExecutedBeat < seq.beat) {
                currentIntroText = seq.text;
                currentIntroImage = (seq.image === 'newgrounds' && assets.ngImage.complete) ? assets.ngImage : null;
            }
        });

        // Track standard rhythm integer triggers for simple updates or logging
        if (Math.floor(currentBeat) > Math.floor(lastExecutedBeat)) {
            // Can sync background visual element flashes here if desired
        }

        lastExecutedBeat = currentBeat;

        if (currentBeat >= TRANSITION_BEAT) {
            currentState = STATES.TITLE_SCREEN;
        }
    } else if (currentState === STATES.TITLE_SCREEN) {
        dareBgOffset -= DARE_BG_SPEED;
        if (dareBgOffset <= -1280) dareBgOffset = 0;

        // Visual logo scale pulse decay logic
        if (Math.floor(currentBeat) > Math.floor(lastExecutedBeat)) {
            logoScale = 1.18; // bump logo on integer beat intervals
        }
        logoScale += (1.0 - logoScale) * 0.15;
        lastExecutedBeat = currentBeat;
    }
}

function draw() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '55px "Phantommuff", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (currentState === STATES.INTRO) {
        ctx.fillStyle = '#FFFFFF';
        let startY = canvas.height / 2 - (currentIntroText.length * 35);
        
        currentIntroText.forEach((line, index) => {
            ctx.fillText(line, canvas.width / 2, startY + (index * 75));
        });

        if (currentIntroImage) {
            let imgW = 350;
            let imgH = 90;
            ctx.drawImage(currentIntroImage, canvas.width / 2 - (imgW / 2), startY + (currentIntroText.length * 75) + 20, imgW, imgH);
        }

    } else if (currentState === STATES.TITLE_SCREEN) {
        if (assets.bgImage.complete && assets.bgImage.width > 0) {
            ctx.drawImage(assets.bgImage, dareBgOffset, 0, 1280, 720);
            ctx.drawImage(assets.bgImage, dareBgOffset + canvas.width, 0, 1280, 720);
        } else {
            ctx.fillStyle = '#330033';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2 - 60);
        ctx.scale(logoScale, logoScale);
        
        if (assets.logoImage.complete && assets.logoImage.width > 0) {
            ctx.drawImage(assets.logoImage, -350, -200, 700, 400);
        } else {
            ctx.fillStyle = '#FFF100';
            ctx.font = '90px "Phantommuff", sans-serif';
            ctx.fillText("PULSE ENGINE", 0, 0);
        }
        ctx.restore();

        ctx.font = '42px "Phantommuff", sans-serif';
        ctx.fillStyle = '#FFFFFF';
        ctx.fillText("CLICK or PRESS ENTER to start", canvas.width / 2, canvas.height - 110);
    }
}

function gameLoop(currentTime) {
    update(currentTime);
    draw();
    requestAnimationFrame(gameLoop);
}

function advanceScreen() {
    if (currentState === STATES.INTRO) {
        currentState = STATES.TITLE_SCREEN;
    } else if (currentState === STATES.TITLE_SCREEN) {
        console.log("Ready for gameloop/mainmenu.js state redirection!");
    }
}

window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') advanceScreen();
});

canvas.addEventListener('click', () => {
    advanceScreen();
});

requestAnimationFrame(gameLoop);
</script>

</body>
</html>
