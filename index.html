<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PulseEngineTest - Menu</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: sans-serif;
  color: white;
}

#bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(#222, #000);
}

#logo {
  position: absolute;
  width: 520px;
  left: 50%;
  top: 15%;
  transform: translateX(-50%);
  animation: bob 2s ease-in-out infinite;
}

@keyframes bob {
  0%,100% { transform: translate(-50%, 0px); }
  50% { transform: translate(-50%, 20px); }
}

#menu {
  position: absolute;
  bottom: 120px;
  width: 100%;
  text-align: center;
  font-size: 28px;
}

.option {
  margin: 10px;
  cursor: pointer;
  user-select: none;
}
</style>

</head>

<body>

<div id="bg"></div>
<img id="logo" src="images/menus/logoBumpin.png">

<div id="menu">
  <div class="option" onclick="playSong()">▶ Play Bopeebo</div>
</div>

<script>
function playSong() {
  window.location.href = "game.html?song=bopeebo";
}
</script>

</body>
</html>
