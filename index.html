<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pulse Engine - Story Mode</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: sans-serif;
}

@font-face {
    font-family: mainFont;
    src: url("data/fonts/main.ttf");
}

#cdnBtn {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px 14px;
    background: #111;
    color: white;
    border: 1px solid white;
    cursor: pointer;
    font-family: mainFont;
    font-size: 16px;
}

#screen {
    width: 100%;
    height: 100%;
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: mainFont;
    color: white;
    flex-direction: column;
}

.option {
    font-size: 48px;
    text-transform: lowercase;
    opacity: 0.6;
}

.selected {
    opacity: 1;
    transform: scale(1.2);
    text-transform: uppercase;
}
</style>
</head>

<body>

<div id="cdnBtn">Use CDN: OFF</div>

<div id="screen">
    <div class="option selected">week 1</div>
</div>

<script>
// =============================
// CDN STATE
// =============================
let useCDN = localStorage.getItem("pulse_cdn") === "1";

const btn = document.getElementById("cdnBtn");

function updateBtn(){
    btn.innerText = "Use CDN: " + (useCDN ? "ON" : "OFF");
}

btn.onclick = () => {
    useCDN = !useCDN;
    localStorage.setItem("pulse_cdn", useCDN ? "1" : "0");
    updateBtn();
};

updateBtn();

// =============================
// START GAME
// =============================
document.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        localStorage.setItem("pulse_week", "1");

        // ALWAYS carry CDN state into game
        let url = "game.html?week=1";

        if (useCDN) {
            url += "&cdn=1";
        }

        location.href = url;
    }
});
</script>

</body>
</html>
